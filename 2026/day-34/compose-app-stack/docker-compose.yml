services:
  web:
    build: ./app
    ports:
      - "8080:5000"
    environment:
      DB_HOST: db
      DB_NAME: devops
      DB_USER: devops
      DB_PASSWORD: devopspass
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net
    labels:
      com.devops.day: "34"
      com.devops.service: "web"
    restart: on-failure

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devops
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devopspass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_net
    labels:
      com.devops.day: "34"
      com.devops.service: "database"
    restart: always

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_net
    labels:
      com.devops.day: "34"
      com.devops.service: "cache"
    restart: on-failure

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:

