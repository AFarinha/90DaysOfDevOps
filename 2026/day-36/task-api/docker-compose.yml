services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: day36-task-api:local
    ports:
      - "8081:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - task_api_net
    restart: on-failure

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - task_api_net
    restart: always

networks:
  task_api_net:
    driver: bridge

volumes:
  postgres_data:

